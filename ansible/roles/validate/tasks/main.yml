- name: Assert volume exists
  ansible.builtin.stat:
    path: "{{ item.path }}"
  register: volume_stat
  loop: "{{ volumes }}"
  failed_when: not volume_stat.stat.exists

- name: Assert volume permissions
  ansible.builtin.assert:
    that:
      - volume_stat.stat.mode == item.mode
  loop: "{{ volumes }}"

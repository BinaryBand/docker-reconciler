version: '3.8'
services:
  web:
    image: nginx:alpine
    user: "1001"
    volumes:
      - /srv/web/data:/usr/share/nginx/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
